version: '3.8'
services:
    postgresdb:
      image: postgres@sha256:81f32a88ec561664634637dd446487efd5f9d90996304b96210078e90e5c8b21
      container_name: postgresdb
      restart: always
      env_file:
        - ".env"
      ports:
        - "5433:5432"
      volumes:
        - pgdata:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
        interval: 10s
        timeout: 5s
        retries: 10
volumes:
  pgdata:
